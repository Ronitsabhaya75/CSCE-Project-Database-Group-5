name: CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  schedule:
    - cron: '0 */6 * * *' # Trigger every 6 hours

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        cd auto-company-db/src
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-html

    - name: Run Unit Tests
      run: |
        cd auto-company-db
        pytest tests/test_unit_*.py -v --junitxml=unit-test-results.xml --html=unit-report.html --self-contained-html

    - name: Run Integration Tests
      run: |
        cd auto-company-db
        pytest tests/test_integration*.py -v --junitxml=integration-test-results.xml --html=integration-report.html --self-contained-html

    - name: Publish Test Results to PR
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: |
          auto-company-db/unit-test-results.xml
          auto-company-db/integration-test-results.xml

    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: |
          auto-company-db/unit-report.html
          auto-company-db/integration-report.html
